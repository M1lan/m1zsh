name: release

# `on` is quoted so YAML 1.1 parsers do not coerce the bare key to a boolean.
"on":
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    name: just check (release gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install apt packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            zsh shellcheck ripgrep

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install GNU Bash 5.3+ via Homebrew
        run: |
          brew install bash
          printf '%s\n' "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: just check
        run: just check

  publish:
    name: Publish GitHub release
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          # --verify-tag refuses to create a release for a tag that does not
          # exist in the remote, which matches what GitHub already pushed here.
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            --verify-tag
